name: 'enterprise_dwh'
version: '1.0.0'
config-version: 2

profile: 'enterprise_dwh'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  enterprise_dwh:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: analytics

vars:
  start_date: '2020-01-01'
  end_date: '2026-12-31'
